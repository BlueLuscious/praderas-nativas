<div id="default-carousel" class="relative w-full h-full" data-carousel="slide" data-carousel-interval="5000">
    
    <!-- Carousel wrapper -->
    <div class="relative w-full h-full overflow-hidden">
        <!-- Item 1 -->
        <div class="hidden duration-500 ease-in-out h-full" data-carousel-item>
            <img src="../static/images/pn-1.webp" alt="...">
        </div>
        <!-- Item 2 -->
        <div class="hidden duration-500 ease-in-out" data-carousel-item>
            <img src="../static/images/pn-2.jpg" alt="...">
        </div>
        <!-- Item 3 -->
        <div class="hidden duration-500 ease-in-out" data-carousel-item>
            <img src="../static/images/pn-3.jpg" alt="...">
        </div>
        <!-- Item 4 -->
        <div class="hidden duration-500 ease-in-out" data-carousel-item>
            <img src="../static/images/pn-4.jpg" alt="...">
        </div>
    </div>
    
    <!-- Slider indicators -->
    <div class="absolute -inset-2 z-30 flex items-end justify-center w-full h-full">
        <div class="flex flex-row gap-x-2 p-2 bg-gray-800/30 rounded-full">
            <button type="button" class="w-4 h-4 rounded-full" aria-current="true" aria-label="Slide 1" data-carousel-slide-to="0"></button>
            <button type="button" class="w-4 h-4 rounded-full" aria-current="false" aria-label="Slide 2" data-carousel-slide-to="1"></button>
            <button type="button" class="w-4 h-4 rounded-full" aria-current="false" aria-label="Slide 3" data-carousel-slide-to="2"></button>
            <button type="button" class="w-4 h-4 rounded-full" aria-current="false" aria-label="Slide 4" data-carousel-slide-to="3"></button>
        </div>
    </div>

    <!-- Slider controls -->
    <button type="button" class="absolute top-0 start-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none" data-carousel-prev>
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-white/30 dark:bg-gray-800/30 group-hover:bg-white/50 dark:group-hover:bg-gray-800/60 group-focus:ring-4 group-focus:ring-white dark:group-focus:ring-gray-800/70 group-focus:outline-none">
            <svg class="w-4 h-4 text-white dark:text-gray-800 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 1 1 5l4 4"/>
            </svg>
            <span class="sr-only">Previous</span>
        </span>
    </button>
    <button type="button" class="absolute top-0 end-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none" data-carousel-next>
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-white/30 dark:bg-gray-800/30 group-hover:bg-white/50 dark:group-hover:bg-gray-800/60 group-focus:ring-4 group-focus:ring-white dark:group-focus:ring-gray-800/70 group-focus:outline-none">
            <svg class="w-4 h-4 text-white dark:text-gray-800 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
            </svg>
            <span class="sr-only">Next</span>
        </span>
    </button>
</div>
