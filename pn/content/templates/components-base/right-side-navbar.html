{# Right Side Bar Background #}
<div id="background_rsn" class="fixed z-40 left-0 bottom-0 md:hidden w-full h-full bg-black bg-opacity-20
    transform translate-x-full">
</div>

{# Right Side Bar #}
<div id="right_side_navbar" class="fixed z-50 right-0 bottom-0 md:hidden flex flex-col items-center gap-y-4 h-full w-full 
    sm:w-2/4 lg:w-1/4 bg-white transform translate-x-full transition-transform duration-300 ease-in-out">

    {# Header #}
    <div class="relative flex flex-row items-center justify-between w-full h-20 mt-2 px-2">
        {# LAbel #}
        <div class="ml-5 text-xl cinzel-semibold">Menú</div>

        {# Close Menu Button #}
        <button type="button" id="close_menu" class="flex items-center mr-5 ml-auto"
            onclick="openSideNavbar('right_side_navbar', 'background_rsn', 'translate-x-full')" 
        >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" 
                class="size-8 transition-transform duration-300 ease-in-out cursor-pointer hover:-rotate-90"
            >
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    {# Sidebar items #}
    <div class="flex flex-col gap-y-4 items-center">
        <div>Inicio</div>
        <div>Nosotros</div>
        <div>Contactanos</div>
    </div>

</div>
