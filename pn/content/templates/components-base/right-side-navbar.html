{# Right Side Bar Background #}
<div id="background_rsn" class="fixed z-40 left-0 bottom-0 md:hidden w-full h-full bg-black bg-opacity-20
    transform translate-x-full">
</div>

{# Right Side Bar #}
<div id="right_side_navbar" class="fixed z-50 right-0 bottom-0 md:hidden flex flex-col items-center gap-y-4 
    h-full w-full max-w-xs bg-secondary-gray_tone_1 transform translate-x-full 
    transition-transform duration-300 ease-in-out"
>
    {# Header #}
    <div class="relative w-full h-16 p-4 text-white">
        <div class="relative flex flex-row items-center justify-between h-16 p-4 border-b border-white">
            {# Label #}
            <div class="text-lg cinzel-semibold">Menú</div>
    
            {# Close Menu Button #}
            <button type="button" id="close_menu" class="flex items-center ml-auto"
                onclick="openSideNavbar('right_side_navbar', 'background_rsn', 'translate-x-full')" 
            >
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" 
                    class="size-6 transition-transform duration-300 ease-in-out cursor-pointer hover:-rotate-90"
                >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    {# Sidebar items #}
    <div class="relative flex flex-col gap-y-4 w-full px-4 py-6 text-center">
        <div class="nav_item w-full p-2 font-semibold rounded-md"
            data-path="/"
        >Inicio</div>
        <div class="nav_item w-full p-2 font-semibold rounded-md"
            data-path="/about_us"
        >Nosotros</div>
        <div class="nav_item w-full p-2 font-semibold rounded-md"
            data-path="/contact_us"
        >Contactanos</div>
    </div>
</div>
